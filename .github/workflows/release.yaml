name: Release

# Builds, signs, and publishes the container image, and (on tag) creates a
# GitHub Release. Two trigger modes share one build path:
#
#   push on v* tag        → semver + latest tags, signed, + GitHub Release
#   workflow_dispatch     → a single dev-<sha> tag, signed, no release
#
# See ARCHITECTURE.md → "Release & distribution" for the security model and
# the repo settings this workflow assumes (tag protection, immutable releases).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {} # deny-by-default; each job grants only what it needs

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to ghcr.io
      id-token: write # cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image tags by mode:
      #   push, stable (v1.2.3)          → :1.2.3, :1.2, :1, :latest
      #   push, prerelease (v1.2.3-rc.1) → :1.2.3-rc.1  (rolling tags suppressed)
      #   workflow_dispatch              → :dev-<sha>   (semver rules are inert on a branch ref)
      #
      # Prerelease guard: on `push: tags` there is no github.event.release
      # object (that's a `release`-event field), so we detect a prerelease by
      # the '-' in the tag name (semver pre-release separator) instead — robust
      # for our v<major>.<minor>.<patch>[-<pre>] convention. `${{ }}` cannot
      # nest, so the dev line keeps an event guard while the other lines inline
      # their own `enable=${{ }}`.
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false # own `latest` explicitly via the raw rule below
          tags: |
            ${{ github.event_name == 'workflow_dispatch' && format('type=raw,value=dev-{0}', github.sha) || '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !contains(github.ref_name, '-') }}

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_VERSION=${{ github.event_name == 'push' && github.ref_name || format('dev-{0}', github.sha) }}
            BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign by digest, not tag: tags are mutable, the digest is the image's
      # immutable identity. Keyless (OIDC) — no signing key to leak or rotate.
      #
      # metadata-action (v6.1.0) exports `tags`/`json` but no bare image-name
      # output, so derive the image from the first tag (highest priority → the
      # exact-version tag), which the action has already lowercased to match
      # what was pushed. `sed 's/:[^:]*$//'` strips only the tag (the last
      # colon + trailing non-colons), leaving any registry port intact.
      - name: Sign image by digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          image="$(printf '%s\n' "$TAGS" | head -n1 | sed 's/:[^:]*$//')"
          cosign sign --yes "${image}@${DIGEST}"

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' # only tag pushes create releases
    permissions:
      contents: write # scoped here so no other job can ever touch releases
    steps:
      # gh is pre-installed and authed via GITHUB_TOKEN — no third-party
      # release action needed (smaller supply-chain surface).
      #
      # GH_REPO pins the repo explicitly so gh doesn't shell out to `git` for
      # repo detection. This job deliberately has no `actions/checkout` step
      # (the build+push happened in the other job on a different runner); without
      # GH_REPO, gh would fail with "not a git repository". gh's only other git
      # call (gitTagInfo) discards its error and is unreachable without
      # --notes-from-tag, which we don't use; --verify-tag/--target hit the API.
      # --generate-notes: GitHub auto-builds the changelog since the previous release.
      # --verify-tag: aborts via the API if the remote tag is missing.
      # --target: pins the release to the exact built commit (API target_commitish).
      # The `gh release view` guard makes re-runs idempotent instead of clobbering.
      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do (idempotent)."
            exit 0
          fi
          gh release create "$TAG" \
            --target "$SHA" \
            --verify-tag \
            --generate-notes \
            --title "$TAG"
